version: '3.9'
services:
  db:
    image: postgres:15
    container_name: myapp-postgres
    environment:
      POSTGRES_DB: myapp_db
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: myapp_password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  myapp:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db-data:
